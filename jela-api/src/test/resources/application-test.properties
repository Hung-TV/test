# H2 in PostgreSQL compatibility mode for tests
spring.datasource.url=jdbc:h2:mem:jela_test;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
app.data-import.enabled=false

# deterministic secret in tests (base64)
app.jwt.secret=ZGV2LXRlc3Qtc2VjcmV0LWdvZXMtaGVyZS1sb25nLWVub3VnaA==
app.jwt.access-token-ttl-seconds=60
app.jwt.refresh-token-ttl-days=7

app.cors.allowed-origins=http://localhost:5173
